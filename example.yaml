# Example ESPHome configuration for an Austrian Kaifa MA309M (EVN/NÖ) smart meter
# read over its M-Bus customer interface, using the modernized
# esphome-dlms-meter-evn external component.
#
# Adjust pins, board, network, and secrets to match your setup.
# Put all sensitive values into your secrets.yaml (see secrets.example.yaml).

esphome:
  name: power-meter
  friendly_name: power-meter

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  # Published fork:
  - source: github://Nirostar/esphome-dlms-meter-evn
    components: [espdm]
    refresh: 1d
  # Or, for local development, comment the above and use:
  # - source:
  #     type: local
  #     path: components
  #   components: [espdm]

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Power-Meter Fallback Hotspot"
    password: !secret wifi_ap_password

captive_portal:

uart:
  id: mbus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 2400
  rx_buffer_size: 2048

sensor:
  - platform: template
    id: meter01_voltage_l1
    name: meter01_voltage_l1
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
  - platform: template
    id: meter01_voltage_l2
    name: meter01_voltage_l2
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
  - platform: template
    id: meter01_voltage_l3
    name: meter01_voltage_l3
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement

  - platform: template
    id: meter01_current_l1
    name: meter01_current_l1
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
  - platform: template
    id: meter01_current_l2
    name: meter01_current_l2
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
  - platform: template
    id: meter01_current_l3
    name: meter01_current_l3
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement

  - platform: template
    id: meter01_active_power_plus
    name: meter01_active_power_plus
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: template
    id: meter01_active_power_minus
    name: meter01_active_power_minus
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: template
    id: meter01_power_factor
    name: meter01_power_factor
    accuracy_decimals: 3
    device_class: power_factor
    state_class: measurement

  - platform: template
    id: meter01_active_energy_plus
    name: meter01_active_energy_plus
    unit_of_measurement: Wh
    accuracy_decimals: 0
    device_class: energy
    state_class: total_increasing
  - platform: template
    id: meter01_active_energy_minus
    name: meter01_active_energy_minus
    unit_of_measurement: Wh
    accuracy_decimals: 0
    device_class: energy
    state_class: total_increasing

  - platform: template
    id: meter01_reactive_energy_plus
    name: meter01_reactive_energy_plus
    unit_of_measurement: Wh
    accuracy_decimals: 0
    device_class: energy
    state_class: total_increasing
  - platform: template
    id: meter01_reactive_energy_minus
    name: meter01_reactive_energy_minus
    unit_of_measurement: Wh
    accuracy_decimals: 0
    device_class: energy
    state_class: total_increasing

text_sensor:
  - platform: template
    id: meter01_timestamp
    name: meter01_timestamp
  - platform: template
    id: meter01_meternumber
    name: meter01_meternumber

# Optional: publish each measurement individually AND get a JSON snapshot below.
mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_broker
  discovery: true

espdm:
  id: dlms_meter1
  uart_id: mbus
  key: !secret dlms_decryption_key       # 32 hex chars / 16 bytes AES key from your provider
  voltage:
    l1: meter01_voltage_l1
    l2: meter01_voltage_l2
    l3: meter01_voltage_l3
  current:
    l1: meter01_current_l1
    l2: meter01_current_l2
    l3: meter01_current_l3
  active_power:
    plus: meter01_active_power_plus
    minus: meter01_active_power_minus
    power_factor: meter01_power_factor
  active_energy:
    plus: meter01_active_energy_plus
    minus: meter01_active_energy_minus
  reactive_energy:
    plus: meter01_reactive_energy_plus
    minus: meter01_reactive_energy_minus
  timestamp: meter01_timestamp
  meternumber: meter01_meternumber

  # Uncomment to also publish the full meter snapshot as a single JSON MQTT message
  # (useful for InfluxDB / time-series sinks):
  # mqtt:
  #   mqtt_id: mqtt_broker
  #   topic: "meter01/data"
